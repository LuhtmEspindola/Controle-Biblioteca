spring.application.name=sistema-biblioteca

# ============================================================
# MongoDB Atlas \u00e2\u0080\u0094 troque pela sua connection string
# Atlas > Connect > Drivers > Java > copie a URI e cole aqui
# Exemplo: mongodb+srv://usuario:senha@cluster0.xxxxx.mongodb.net/biblioteca?retryWrites=true&w=majority
# ============================================================
spring.data.mongodb.uri=mongodb+srv://SEU_USUARIO:SUA_SENHA@cluster0.XXXXX.mongodb.net/biblioteca?retryWrites=true&w=majority
spring.data.mongodb.database=biblioteca

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server
server.port=8081

# Logging
logging.level.com.biblioteca=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
