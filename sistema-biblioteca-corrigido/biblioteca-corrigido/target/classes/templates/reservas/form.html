<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova Reserva — BiblioSystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="nav-brand"><span class="brand-icon">📚</span><span class="brand-text">BiblioSystem</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/livros}">Livros</a></li>
        <li><a th:href="@{/usuarios}">Usuários</a></li>
        <li><a th:href="@{/emprestimos}">Empréstimos</a></li>
        <li><a th:href="@{/reservas}" class="active">Reservas</a></li>
        <li><a th:href="@{/multas}">Multas</a></li>
    </ul>
    <div class="sidebar-footer">BIBLIOTECH v1.0</div>
</nav>
<main class="main-content">
    <div class="page-header">
        <div><h1 class="page-title">Nova Reserva</h1><p class="page-subtitle">Reserva válida por 7 dias</p></div>
        <a th:href="@{/reservas}" class="btn btn-ghost">← Voltar</a>
    </div>
    <div class="form-card">
        <form th:action="@{/reservas/reservar}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="usuarioId">Usuário *</label>
                    <select id="usuarioId" name="usuarioId" class="form-control" required>
                        <option value="">Selecione o usuário...</option>
                        <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nome + ' (' + u.matricula + ')'}">-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="livroId">Livro *</label>
                    <select id="livroId" name="livroId" class="form-control" required>
                        <option value="">Selecione o livro...</option>
                        <option th:each="l : ${livros}" th:value="${l.id}" th:text="${l.titulo + ' — ' + l.autor}">-</option>
                    </select>
                </div>
            </div>
            <div class="info-box">
                <p>📌 A reserva ficará ativa por <strong>7 dias</strong> a partir de hoje.</p>
            </div>
            <div class="form-actions">
                <a th:href="@{/reservas}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-primary">Confirmar Reserva</button>
            </div>
        </form>
    </div>
</main>
<footer class="footer"><p>Sistema de Controle de Biblioteca &copy; 2024</p></footer>
</body>
</html>
