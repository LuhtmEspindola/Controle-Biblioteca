<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Livro — BiblioSystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="nav-brand"><span class="brand-icon">📚</span><span class="brand-text">BiblioSystem</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/livros}" class="active">Livros</a></li>
        <li><a th:href="@{/usuarios}">Usuários</a></li>
        <li><a th:href="@{/emprestimos}">Empréstimos</a></li>
        <li><a th:href="@{/reservas}">Reservas</a></li>
        <li><a th:href="@{/multas}">Multas</a></li>
    </ul>
    <div class="sidebar-footer">BIBLIOTECH v1.0</div>
</nav>
<main class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${livro.id != null} ? 'Editar Livro' : 'Novo Livro'">Livro</h1>
            <p class="page-subtitle">Preencha os dados do livro</p>
        </div>
        <a th:href="@{/livros}" class="btn btn-ghost">← Voltar</a>
    </div>
    <div class="form-card">
        <form th:action="@{/livros/salvar}" method="post" th:object="${livro}">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-grid">
                <div class="form-group">
                    <label for="titulo">Título *</label>
                    <input type="text" id="titulo" th:field="*{titulo}" class="form-control" required placeholder="Título do livro"/>
                </div>
                <div class="form-group">
                    <label for="autor">Autor *</label>
                    <input type="text" id="autor" th:field="*{autor}" class="form-control" required placeholder="Nome do autor"/>
                </div>
                <div class="form-group">
                    <label for="anoPublicacao">Ano de Publicação</label>
                    <input type="number" id="anoPublicacao" th:field="*{anoPublicacao}" class="form-control" min="1800" max="2100"/>
                </div>
                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" th:field="*{categoria}" class="form-control" placeholder="Ex: Ficção, Técnico..."/>
                </div>
                <div class="form-group">
                    <label for="quantidadeDisponivel">Quantidade Disponível *</label>
                    <input type="number" id="quantidadeDisponivel" th:field="*{quantidadeDisponivel}" class="form-control" min="0" required/>
                </div>
            </div>
            <div class="form-actions">
                <a th:href="@{/livros}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-primary">Salvar Livro</button>
            </div>
        </form>
    </div>
</main>
<footer class="footer"><p>Sistema de Controle de Biblioteca &copy; 2024</p></footer>
</body>
</html>
